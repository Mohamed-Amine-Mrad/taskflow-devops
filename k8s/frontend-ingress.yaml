apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskflow-frontend-ingress
spec:
  rules:
    - host: taskflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskflow-frontend-service
                port:
                  number: 3000
